name: Release
on:
  release:
    types: [ released, prereleased ]
permissions:
  contents: write
jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_version: ${{ github.event.release.tag_name }}
      - name: Collect artifacts
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p artifacts
          for module in $(./gradlew -q printPublishableModules --no-configuration-cache); do
            if [ -d "$module/build/libs" ]; then
              find "$module/build/libs" -type f \
                -name "*-${VERSION}.jar" \
                -not -name "*-metadata-${VERSION}.jar" \
                -not -name "*-sources.jar" \
                -not -name "*-javadoc.jar" \
                -exec cp {} artifacts/ \;
            fi
            # AGP KMP library emits unversioned "$module.aar"; Maven publishes it as
            # "$module-android-$VERSION.aar" — rename to match Central / GH release naming.
            if [ -d "$module/build/outputs/aar" ]; then
              for aar in "$module"/build/outputs/aar/*.aar; do
                [ -f "$aar" ] || continue
                cp "$aar" "artifacts/${module}-android-${VERSION}.aar"
              done
            fi
          done
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.event.release.name }}
          body: ${{ github.event.release.body }}
          files: artifacts/*
